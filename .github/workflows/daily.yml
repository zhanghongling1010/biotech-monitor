name: Daily Biotech Monitor Update

on:
  schedule:
    # 每天北京时间早上8点运行 (UTC 0点)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Collect PubMed data
        run: python scripts/collect_pubmed.py

      - name: Collect News & Clinical data
        run: python scripts/collect_news.py

      - name: Collect BD News
        run: python scripts/collect_bd_news.py

      - name: Merge data
        run: python scripts/daily_update.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Update data $(date +'%Y-%m-%d')"
          git push